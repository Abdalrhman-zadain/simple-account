services:
  postgres:
    image: postgres:16-alpine
    container_name: simple-account-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_account
      POSTGRES_USER: simple_account_user
      POSTGRES_PASSWORD: simple_account_pass
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simple_account_user -d simple_account"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
